<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="images/favicon.png">

<title>ICYIC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 40px 34px 50px 34px;
      position: relative;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-size: 40px;
      line-height: 1;
      margin-bottom: 22px;
    }

    .back:hover {
      opacity: 0.65;
    }

    .title {
      margin: 0;
      font-size: 78px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    .contact-info {
      position: absolute;
      right: 120px;
      bottom: 90px;
      text-align: left;
    }

    .contact-label {
      margin: 0 0 18px 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .contact-mail {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: #111;
      text-decoration: none;
    }

    .contact-mail:hover {
      text-decoration: underline;
    }

    @media (max-width: 1600px) {
      .title {
        font-size: 64px;
      }

      .contact-info {
        right: 90px;
        bottom: 70px;
      }

      .contact-label {
        font-size: 28px;
      }

      .contact-mail {
        font-size: 20px;
      }
    }

    @media (max-width: 1200px) {
      .page {
        padding: 28px 24px 40px 24px;
      }

      .back {
        font-size: 34px;
        margin-bottom: 18px;
      }

      .title {
        font-size: 48px;
      }

      .contact-info {
        position: static;
        margin-top: 280px;
        text-align: left;
      }

      .contact-label {
        font-size: 24px;
      }

      .contact-mail {
        font-size: 18px;
      }
    }

    @media (max-width: 700px) {
      .title {
        font-size: 34px;
      }

      .back {
        font-size: 28px;
      }

      .contact-info {
        margin-top: 180px;
      }

      .contact-label {
        font-size: 22px;
      }

      .contact-mail {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html" aria-label="Back to home">←</a>

    <h1 class="title">CONTACT</h1>

    <div class="contact-info">
      <h2 class="contact-label">e-mail</h2>
      <a class="contact-mail" href="mailto:asdf616asdf@naver.com">asdf616asdf@naver.com</a>
    </div>
  </main>
</body>
</html>
