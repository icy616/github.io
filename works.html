<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Works - ICYIC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 40px 34px 50px 34px;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-size: 40px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .back:hover {
      opacity: 0.65;
    }

    .title {
      margin: 0;
      font-size: 78px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    /* WORKS 시작점에 맞춘 메뉴 영역 */
    .menu {
      margin-top: 48px;
      margin-left: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 56px;
      padding-left: 0;
    }

    .left,
    .right {
      display: block;
    }

    .left {
      text-align: left;
    }

    .right {
      text-align: right;
    }

    .menu a {
      text-decoration: none;
      color: #b7b7b7;
      font-size: 92px;
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -0.05em;
      display: block;
      transition: color .25s ease, opacity .25s ease;
    }

    .menu a:hover {
      color: #111;
      opacity: 1;
    }

    .amp {
      font-family: 'Times New Roman', Georgia, serif;
      font-size: 86px;
      line-height: 0.95;
      font-weight: 200;
      letter-spacing: -0.04em;
      color: #111;
      transform: translateY(8px);
      user-select: none;
    }

    @media (max-width: 1600px) {
      .title {
        font-size: 64px;
      }

      .menu {
        gap: 44px;
        margin-top: 40px;
      }

      .menu a {
        font-size: 78px;
      }

      .amp {
        font-size: 72px;
      }
    }

    @media (max-width: 1200px) {
      .page {
        padding: 28px 24px 40px 24px;
      }

      .back {
        font-size: 34px;
        margin-bottom: 8px;
      }

      .title {
        font-size: 48px;
      }

      .menu {
        margin-top: 36px;
        gap: 28px;
      }

      .menu a {
        font-size: 64px;
      }

      .amp {
        font-size: 60px;
        transform: translateY(6px);
      }
    }

    @media (max-width: 700px) {
      .back {
        font-size: 28px;
      }

      .title {
        font-size: 34px;
      }

      .menu {
        margin-top: 28px;
        gap: 18px;
      }

      .menu a {
        font-size: 36px;
      }

      .amp {
        font-size: 44px;
        transform: translateY(4px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="index.html" aria-label="Back to home">←</a>

    <h1 class="title">WORKS</h1>

    <section class="menu">
      <div class="left">
        <a href="craft-design.html">Craft and<br>Design</a>
      </div>

      <div class="amp">&amp;</div>

      <div class="right">
        <a href="two-three-d.html">2D and<br>3D</a>
      </div>
    </section>
  </main>
</body>
</html>
