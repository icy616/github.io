<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Works - ICYIC</title>

<style>

body{
margin:0;
font-family:Helvetica,Arial,sans-serif;
background:white;
color:#111;
}

.wrap{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

/* 작품 카드 */

.work{
position:relative;
aspect-ratio:1/1;
overflow:hidden;
}

/* 이미지 */

.work img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* hover overlay */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.5);
color:white;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

opacity:0;

transition:0.3s;
}

/* hover effect */

.work:hover .overlay{
opacity:1;
}

</style>
</head>

<body>

<div class="wrap">

<h1>WORKS</h1>

<div class="grid">

<a href="project1.html" class="work">
<img src="images/work1.jpg">
<div class="overlay">Project One</div>
</a>

<a href="project2.html" class="work">
<img src="images/work2.jpg">
<div class="overlay">Project Two</div>
</a>

<a href="project3.html" class="work">
<img src="images/work3.jpg">
<div class="overlay">Project Three</div>
</a>

<a href="project4.html" class="work">
<img src="images/work4.jpg">
<div class="overlay">Project Four</div>
</a>

</div>

</div>

</body>
</html>
