<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Works - ICYIC</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    .wrap {
      padding: 28px 24px;
    }

    .back {
      display: inline-block;
      margin-bottom: 30px;
      color: #111;
      text-decoration: none;
      font-size: 18px;
    }

    .back:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 60px;
      margin: 0 0 40px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .work img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">HOME</a>
    <h1>WORKS</h1>

    <div class="grid">
      <div class="work">
        <img src="images/work1.jpg" alt="Work 1">
      </div>

      <div class="work">
        <img src="images/work2.jpg" alt="Work 2">
      </div>

      <div class="work">
        <img src="images/work3.jpg" alt="Work 3">
      </div>

       <div class="work">
        <img src="images/work4.jpg" alt="Work 4">
      </div>
    </div>
  </div>
</body>
</html>
