<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#f3f3f3;
color:#111;
font-family:Helvetica, Arial, sans-serif;
}

.page{
min-height:100vh;
padding:40px 34px;
display:flex;
flex-direction:column;
}

/* back arrow */

.back{
display:inline-block;
font-size:40px;
text-decoration:none;
color:#111;
margin-bottom:10px;
}

.back:hover{
opacity:.6;
}

/* title */

.title{
font-size:78px;
font-weight:700;
letter-spacing:-0.035em;
margin:0;
}

/* center layout */

.menu-wrap{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* menu grid */

.menu-grid{

display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
width:1200px;
max-width:90vw;

}

/* left */

.menu-left{
text-align:right;
}

.menu-left a{
font-size:120px;
font-weight:700;
line-height:1.05;
letter-spacing:-0.04em;
text-decoration:none;
color:#111;
}

.menu-left a:hover{
opacity:.6;
}

/* ampersand */

.menu-and{
font-size:120px;
font-weight:200;
padding:0 80px;
font-family: Helvetica, Arial, sans-serif;
}

/* right */

.menu-right{
text-align:left;
}

.menu-right a{
font-size:120px;
font-weight:700;
line-height:1.05;
letter-spacing:-0.04em;
text-decoration:none;
color:#111;
}

.menu-right a:hover{
opacity:.6;
}


/* responsive */

@media (max-width:1200px){

.title{
font-size:48px;
}

.menu-left a,
.menu-right a{
font-size:72px;
}

.menu-and{
font-size:72px;
padding:0 40px;
}

}

@media (max-width:700px){

.menu-grid{
grid-template-columns:1fr;
gap:30px;
text-align:center;
}

.menu-left{
text-align:center;
}

.menu-right{
text-align:center;
}

.menu-and{
display:none;
}

}

</style>
</head>
