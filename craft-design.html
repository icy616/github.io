<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Craft and Design - ICYIC</title>

  <link rel="icon" type="image/png" href="images/favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #f3f3f3;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 40px 34px 60px 34px;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-size: 40px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .back:hover {
      opacity: 0.65;
    }

    .title-link {
      text-decoration: none;
      color: #111;
      display: inline-block;
    }

    .title {
      margin: 0 0 52px 0;
      font-size: 78px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    .title-link:hover {
      opacity: 0.8;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      column-gap: 56px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 36px;
      align-self: start;
    }

    .category-block {
      margin-bottom: 34px;
    }

    .category-button {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0 0 12px 0;
      text-align: left;
      font: inherit;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      color: #111;
      cursor: pointer;
      transition: opacity .2s ease;
    }

    .category-button:hover {
      opacity: 0.65;
    }

    .category-button.active {
      opacity: 1;
    }

    .subcategory-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subcategory-item {
      display: block;
      text-decoration: none;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 500;
      color: #b7b7b7;
      letter-spacing: -0.01em;
      transition: color .2s ease;
    }

    .subcategory-item:hover {
      color: #666;
    }

    .viewer {
      min-width: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .work-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .work-thumb {
      width: 100%;
      aspect-ratio: 4 / 5;
      background-color: #d9d9d9;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity .25s ease, transform .25s ease;
    }

    .work-card:hover .work-thumb {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    @media (max-width: 1400px) {
      .title {
        font-size: 64px;
      }

      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
        column-gap: 44px;
      }

      .category-button {
        font-size: 20px;
      }
    }

    @media (max-width: 1000px) {
      .page {
        padding: 28px 24px 40px 24px;
      }

      .back {
        font-size: 34px;
      }

      .title {
        font-size: 48px;
        margin-bottom: 36px;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 34px;
      }

      .sidebar {
        position: static;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .category-button {
        font-size: 18px;
      }
    }

    @media (max-width: 700px) {
      .title {
        font-size: 34px;
      }

      .back {
        font-size: 28px;
      }

      .subcategory-item {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="works.html" aria-label="Back to works">←</a>

    <a class="title-link" href="craft-design.html">
      <h1 class="title">Craft and Design</h1>
    </a>

    <section class="layout">
      <aside class="sidebar">
        <div class="category-block">
          <button class="category-button active" data-category="all">All</button>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="lazy-series">Lazy series</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="lazy-temple-2026.html">Lazy Temple (2026)</a>
            <a class="subcategory-item" href="lazy-temple-2023.html">Lazy Temple (2023)</a>
            <a class="subcategory-item" href="lazy-jar-2023.html">Lazy Jar (2023)</a>
            <a class="subcategory-item" href="lazy-lamp-2023.html">Lazy Lamp (2023)</a>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="composition">Composition</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="composition-2023.html">Composition (2023)</a>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="object">Object</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="bubble-bed-2023.html">Bubble bed (2023)</a>
            <a class="subcategory-item" href="keen-healer-2022.html">Keen healer (2022)</a>
            <a class="subcategory-item" href="flower-in-caustics-2022.html">Flower in caustics (2022)</a>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="furniture">Furniture</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="pivot-joint-2021.html">Pivot Joint (2021)</a>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="ceramic">Ceramic</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="moon-jar-2026.html">Moon Jar (2026)</a>
            <a class="subcategory-item" href="lean-series-2023.html">Lean series (2023)</a>
            <a class="subcategory-item" href="cubism-2022.html">Cubism (2022)</a>
            <a class="subcategory-item" href="scar-jar-2021.html">Scar Jar (2021)</a>
            <a class="subcategory-item" href="skin-vase-2021.html">Skin vase (2021)</a>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="metal">Metal</button>
          <div class="subcategory-list">
            <a class="subcategory-item" href="metal-work.html">Metal work</a>
          </div>
        </div>
      </aside>

      <section class="viewer">
        <div class="grid" id="grid"></div>
      </section>
    </section>
  </main>

  <script>
    const works = [
      {
        category: "lazy-series",
        image: "images/craft/lazy-series-1.jpg",
        link: "lazy-temple-2026.html"
      },
      {
        category: "lazy-series",
        image: "images/craft/lazy-series-2.jpg",
        link: "lazy-temple-2023.html"
      },
      {
        category: "lazy-series",
        image: "images/craft/lazy-series-3.jpg",
        link: "lazy-jar-2023.html"
      },
      {
        category: "lazy-series",
        image: "images/craft/lazy-series-4.jpg",
        link: "lazy-lamp-2023.html"
      },

      {
        category: "composition",
        image: "images/craft/composition-1.jpg",
        link: "composition-2023.html"
      },

      {
        category: "object",
        image: "images/craft/object-1.jpg",
        link: "bubble-bed-2023.html"
      },
      {
        category: "object",
        image: "images/craft/object-2.jpg",
        link: "keen-healer-2022.html"
      },
      {
        category: "object",
        image: "images/craft/object-3.jpg",
        link: "flower-in-caustics-2022.html"
      },

      {
        category: "furniture",
        image: "images/craft/furniture-1.jpg",
        link: "pivot-joint-2021.html"
      },

      {
        category: "ceramic",
        image: "images/craft/ceramic-1.jpg",
        link: "moon-jar-2026.html"
      },
      {
        category: "ceramic",
        image: "images/craft/ceramic-2.jpg",
        link: "lean-series-2023.html"
      },
      {
        category: "ceramic",
        image: "images/craft/ceramic-3.jpg",
        link: "cubism-2022.html"
      },
      {
        category: "ceramic",
        image: "images/craft/ceramic-4.jpg",
        link: "scar-jar-2021.html"
      },
      {
        category: "ceramic",
        image: "images/craft/ceramic-5.jpg",
        link: "skin-vase-2021.html"
      },

      {
        category: "metal",
        image: "images/craft/metal-1.jpg",
        link: "metal-work.html"
      }
    ];

    const grid = document.getElementById("grid");
    const buttons = document.querySelectorAll(".category-button");

    function renderWorks(category) {
      const filtered = category === "all"
        ? works
        : works.filter(work => work.category === category);

      grid.innerHTML = filtered.map(work => `
        <a class="work-card" href="${work.link}">
          <div class="work-thumb" style="background-image:url('${work.image}')"></div>
        </a>
      `).join("");
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        buttons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        renderWorks(button.dataset.category);
      });
    });

    renderWorks("all");
  </script>
</body>
</html>
