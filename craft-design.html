<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Craft and Design - ICYIC</title>

  <link rel="icon" type="image/png" href="images/favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #f3f3f3;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 40px 34px 60px 34px;
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-size: 40px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .back:hover {
      opacity: 0.65;
    }

    .title {
      margin: 0 0 52px 0;
      font-size: 78px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      column-gap: 56px;
      align-items: start;
    }

    /* 왼쪽 메뉴 sticky */
    .sidebar {
      position: sticky;
      top: 36px;
      align-self: start;
    }

    .category-block {
      margin-bottom: 34px;
    }

    .category-button {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0 0 12px 0;
      text-align: left;
      font: inherit;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      color: #111;
      cursor: pointer;
      transition: opacity .2s ease;
    }

    .category-button:hover {
      opacity: 0.65;
    }

    .category-button.active {
      opacity: 1;
    }

    .subcategory-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subcategory-item {
      font-size: 14px;
      line-height: 1.2;
      font-weight: 500;
      color: #b7b7b7;
      letter-spacing: -0.01em;
    }

    .viewer {
      min-width: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .work-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .work-thumb {
      width: 100%;
      aspect-ratio: 4 / 5;
      background-color: #d9d9d9;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity .25s ease, transform .25s ease;
    }

    .work-card:hover .work-thumb {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* 카드 밑 텍스트가 필요한 경우 대비 */
    .work-caption {
      display: none;
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 600;
    }

    @media (max-width: 1400px) {
      .title {
        font-size: 64px;
      }

      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
        column-gap: 44px;
      }

      .category-button {
        font-size: 20px;
      }
    }

    @media (max-width: 1000px) {
      .page {
        padding: 28px 24px 40px 24px;
      }

      .back {
        font-size: 34px;
      }

      .title {
        font-size: 48px;
        margin-bottom: 36px;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 34px;
      }

      .sidebar {
        position: static;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .category-button {
        font-size: 18px;
      }
    }

    @media (max-width: 700px) {
      .title {
        font-size: 34px;
      }

      .back {
        font-size: 28px;
      }

      .subcategory-item {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="works.html" aria-label="Back to works">←</a>

    <h1 class="title">Craft and Design</h1>

    <section class="layout">
      <!-- LEFT MENU -->
      <aside class="sidebar">
        <div class="category-block">
          <button class="category-button active" data-category="lazy-series">Lazy series</button>
          <div class="subcategory-list">
            <div class="subcategory-item">Lazy Temple (2026)</div>
            <div class="subcategory-item">Lazy Temple (2023)</div>
            <div class="subcategory-item">Lazy Jar (2023)</div>
            <div class="subcategory-item">Lazy Lamp (2023)</div>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="composition">Composition</button>
          <div class="subcategory-list">
            <div class="subcategory-item">Composition (2023)</div>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="object">Object</button>
          <div class="subcategory-list">
            <div class="subcategory-item">Bubble bed (2023)</div>
            <div class="subcategory-item">Keen healer (2022)</div>
            <div class="subcategory-item">Flower in caustics (2022)</div>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="furniture">Furniture</button>
          <div class="subcategory-list">
            <div class="subcategory-item">Pivot Joint (2021)</div>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="ceramic">Ceramic</button>
          <div class="subcategory-list">
            <div class="subcategory-item">Moon Jar (2026)</div>
            <div class="subcategory-item">Lean series (2023)</div>
            <div class="subcategory-item">Cubism (2022)</div>
            <div class="subcategory-item">Scar Jar (2021)</div>
            <div class="subcategory-item">Skin vase (2021)</div>
          </div>
        </div>

        <div class="category-block">
          <button class="category-button" data-category="metal">Metal</button>
          <div class="subcategory-list">
            <div class="subcategory-item">—</div>
          </div>
        </div>
      </aside>

      <!-- RIGHT GRID -->
      <section class="viewer">
        <div class="grid">
          <a class="work-card" id="card1" href="#">
            <div class="work-thumb" id="thumb1"></div>
          </a>

          <a class="work-card" id="card2" href="#">
            <div class="work-thumb" id="thumb2"></div>
          </a>

          <a class="work-card" id="card3" href="#">
            <div class="work-thumb" id="thumb3"></div>
          </a>

          <a class="work-card" id="card4" href="#">
            <div class="work-thumb" id="thumb4"></div>
          </a>

          <a class="work-card" id="card5" href="#">
            <div class="work-thumb" id="thumb5"></div>
          </a>

          <a class="work-card" id="card6" href="#">
            <div class="work-thumb" id="thumb6"></div>
          </a>
        </div>
      </section>
    </section>
  </main>

  <script>
    const categories = {
      "lazy-series": [
        { image: "images/craft/lazy-series-1.jpg", link: "#" },
        { image: "images/craft/lazy-series-2.jpg", link: "#" },
        { image: "images/craft/lazy-series-3.jpg", link: "#" },
        { image: "images/craft/lazy-series-4.jpg", link: "#" },
        { image: "images/craft/lazy-series-5.jpg", link: "#" },
        { image: "images/craft/lazy-series-6.jpg", link: "#" }
      ],
      "composition": [
        { image: "images/craft/composition-1.jpg", link: "#" },
        { image: "images/craft/composition-2.jpg", link: "#" },
        { image: "images/craft/composition-3.jpg", link: "#" },
        { image: "images/craft/composition-4.jpg", link: "#" },
        { image: "images/craft/composition-5.jpg", link: "#" },
        { image: "images/craft/composition-6.jpg", link: "#" }
      ],
      "object": [
        { image: "images/craft/object-1.jpg", link: "#" },
        { image: "images/craft/object-2.jpg", link: "#" },
        { image: "images/craft/object-3.jpg", link: "#" },
        { image: "images/craft/object-4.jpg", link: "#" },
        { image: "images/craft/object-5.jpg", link: "#" },
        { image: "images/craft/object-6.jpg", link: "#" }
      ],
      "furniture": [
        { image: "images/craft/furniture-1.jpg", link: "#" },
        { image: "images/craft/furniture-2.jpg", link: "#" },
        { image: "images/craft/furniture-3.jpg", link: "#" },
        { image: "images/craft/furniture-4.jpg", link: "#" },
        { image: "images/craft/furniture-5.jpg", link: "#" },
        { image: "images/craft/furniture-6.jpg", link: "#" }
      ],
      "ceramic": [
        { image: "images/craft/ceramic-1.jpg", link: "#" },
        { image: "images/craft/ceramic-2.jpg", link: "#" },
        { image: "images/craft/ceramic-3.jpg", link: "#" },
        { image: "images/craft/ceramic-4.jpg", link: "#" },
        { image: "images/craft/ceramic-5.jpg", link: "#" },
        { image: "images/craft/ceramic-6.jpg", link: "#" }
      ],
      "metal": [
        { image: "images/craft/metal-1.jpg", link: "#" },
        { image: "images/craft/metal-2.jpg", link: "#" },
        { image: "images/craft/metal-3.jpg", link: "#" },
        { image: "images/craft/metal-4.jpg", link: "#" },
        { image: "images/craft/metal-5.jpg", link: "#" },
        { image: "images/craft/metal-6.jpg", link: "#" }
      ]
    };

    const buttons = document.querySelectorAll(".category-button");

    function renderCategory(key) {
      const items = categories[key];

      for (let i = 0; i < 6; i++) {
        const card = document.getElementById(`card${i + 1}`);
        const thumb = document.getElementById(`thumb${i + 1}`);

        if (items[i]) {
          thumb.style.backgroundImage = `url('${items[i].image}')`;
          card.href = items[i].link || "#";
          card.style.display = "block";
        } else {
          thumb.style.backgroundImage = "none";
          card.href = "#";
          card.style.display = "none";
        }
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        buttons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        renderCategory(button.dataset.category);
      });
    });

    renderCategory("lazy-series");
  </script>
</body>
</html>
