<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ICYIC</title>

<link rel="icon" type="image/png" href="images/favicon.png">

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
background:#ffffff;
color:#111;
font-family:Helvetica, Arial, sans-serif;
overflow-x:hidden;
}

/* 전체 페이지 */

.page{
position:relative;
min-height:100vh;
padding:0 24px;
}

/* 로고 */

.hero-mark{
position:absolute;
top:-120px;
left:-120px;
width:520px;
height:auto;
z-index:1;
pointer-events:none;
}

/* 메뉴 */

.menu{
position:relative;
z-index:2;

padding-top:520px;

display:flex;
flex-direction:column;
align-items:flex-start;
gap:8px;
}

.menu a{
text-decoration:none;
color:#111;

font-size:110px;
line-height:0.9;
font-weight:300;

letter-spacing:-0.05em;
}

.menu a:hover{
opacity:.6;
}

/* 반응형 */

@media (max-width:1400px){

.hero-mark{
width:420px;
top:-100px;
left:-100px;
}

.menu{
padding-top:440px;
}

.menu a{
font-size:90px;
}

}

@media (max-width:900px){

.hero-mark{
width:320px;
top:-70px;
left:-70px;
}

.menu{
padding-top:320px;
}

.menu a{
font-size:60px;
}

}

@media (max-width:600px){

.hero-mark{
width:260px;
top:-50px;
left:-50px;
}

.menu{
padding-top:260px;
}

.menu a{
font-size:46px;
}

}

</style>
</head>

<body>

<main class="page">

<img class="hero-mark" src="images/favicon.png">

<nav class="menu">
<a href="about.html">ABOUT</a>
<a href="works.html">WORKS</a>
<a href="press.html">PRESS</a>
<a href="contact.html">CONTACT</a>
<a href="https://instagram.com" target="_blank">INSTAGRAM</a>
</nav>

</main>

</body>
</html>
